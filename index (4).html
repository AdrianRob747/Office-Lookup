<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearest Office Finder – Cheapest Auto Insurance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    .logo-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-icon { width: 42px; height: 42px; background: #1d6fd8; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-icon i { font-size: 22px; color: #fff; }
    .logo-text { font-size: 16px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
    .logo-sub { font-size: 12px; color: #888; font-weight: 400; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #e8e8e8; padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .card-header { margin-bottom: 1.5rem; }
    .card-header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .card-header p { font-size: 14px; color: #777; line-height: 1.5; }
    .search-wrap { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-wrap input {
      flex: 1; height: 44px; padding: 0 14px; font-size: 15px;
      font-family: 'Inter', sans-serif; border: 1.5px solid #e0e0e0;
      border-radius: 10px; background: #fafafa; color: #1a1a1a;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    .search-wrap input:focus { border-color: #1d6fd8; box-shadow: 0 0 0 3px rgba(29,111,216,0.12); background: #fff; }
    .search-wrap input::placeholder { color: #bbb; }
    .btn-search {
      height: 44px; padding: 0 18px; font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif; background: #1d6fd8; color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-search:hover { background: #1558b0; }
    .btn-search:active { transform: scale(0.97); }
    .status { font-size: 13px; color: #999; min-height: 18px; margin-bottom: 0.75rem; }
    .status.err { color: #c0392b; }
    .result-card { background: #f0f6ff; border: 2px solid #1d6fd8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .result-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .result-icon { width: 42px; height: 42px; background: #1d6fd8; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .result-icon i { font-size: 20px; color: #fff; }
    .result-label-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .brand-pill { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; background: #ddeeff; color: #1558b0; font-weight: 500; margin: 3px 0; }
    .result-addr { font-size: 13px; color: #666; margin-top: 2px; }
    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill { display: flex; align-items: center; gap: 5px; font-size: 13px; padding: 5px 12px; border-radius: 999px; background: #e8f0fb; color: #1558b0; font-weight: 500; }
    .pill i { font-size: 14px; }
    .btn-maps {
      display: inline-flex; align-items: center; gap: 8px; height: 38px;
      padding: 0 16px; font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a;
      border: 1.5px solid #d0d0d0; border-radius: 8px; cursor: pointer;
      text-decoration: none; transition: background 0.15s, border-color 0.15s;
    }
    .btn-maps:hover { background: #f5f5f3; border-color: #aaa; }
    .others-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin: 1.25rem 0 0.6rem; }
    .others-list { display: flex; flex-direction: column; gap: 8px; }
    .other-row { display: flex; align-items: center; gap: 10px; background: #f9f9f9; border: 1px solid #efefef; border-radius: 10px; padding: 10px 14px; }
    .other-rank { font-size: 12px; color: #bbb; font-weight: 600; min-width: 20px; }
    .other-info { flex: 1; }
    .other-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .other-addr { font-size: 12px; color: #999; margin-top: 1px; }
    .other-time { font-size: 13px; color: #777; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .hidden { display: none; }
    footer { margin-top: 2rem; font-size: 12px; color: #bbb; text-align: center; }
    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      .search-wrap { flex-direction: column; }
      .btn-search { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="logo-bar">
    <div class="logo-icon"><i class="ti ti-car"></i></div>
    <div>
      <div class="logo-text">Cheapest Auto Insurance</div>
      <div class="logo-sub">Agent Office Finder</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h1>Find the Nearest Office</h1>
      <p>Enter a customer's address to instantly find the closest location and get driving directions.</p>
    </div>
    <div class="search-wrap">
      <input type="text" id="addr" placeholder="e.g. 1234 E 41st St, Tulsa, OK" />
      <button class="btn-search" onclick="findNearest()">
        <i class="ti ti-search"></i> Find Nearest
      </button>
    </div>
    <div class="status" id="status"></div>
    <div id="results" class="hidden"></div>
  </div>

  <footer>For internal agent use only &nbsp;·&nbsp; Cheapest Auto Insurance</footer>

  <script>
    const GEOAPIFY_KEY = '2565c3fb6e6247fabe92d9b7532c554d';

    const OFFICES = [
      { label: "15th & Memorial",     brand: "Cheapest Auto Insurance",  addr: "3245 E 15th St, Tulsa, OK 74104",                 lat: 36.1408, lon: -95.9406 },
      { label: "15th & Harvard",      brand: "Cheapest Auto Insurance",  addr: "3245 E 15th St, Tulsa, OK 74104",                 lat: 36.1408, lon: -95.9406 },
      { label: "31st & Mingo",        brand: "Cheapest Auto Insurance",  addr: "9747 E 31st St, Tulsa, OK 74146",                 lat: 36.1218, lon: -95.8468 },
      { label: "41st & Yale",         brand: "Cheapest Auto Insurance",  addr: "4024 S Yale Ave, Tulsa, OK 74135",                lat: 36.1074, lon: -95.9344 },
      { label: "53rd & Peoria",       brand: "Cheapest Auto Insurance",  addr: "5308 S Peoria Ave Suite C, Tulsa, OK 74105",      lat: 36.0863, lon: -95.9763 },
      { label: "61st & Memorial",     brand: "Cheapest Auto Insurance",  addr: "6030 S Memorial Dr, Tulsa, OK 74145",             lat: 36.0748, lon: -95.8920 },
      { label: "71st St",             brand: "Save Money Car Insurance", addr: "8310 E 71st St, Tulsa, OK 74133",                 lat: 36.0513, lon: -95.8632 },
      { label: "Sheridan",            brand: "Save Money Car Insurance", addr: "1505 S Sheridan Rd, Tulsa, OK 74112",             lat: 36.1402, lon: -95.9040 },
      { label: "West Tulsa",          brand: "Cheapest Auto Insurance",  addr: "4377 Southwest Blvd, Tulsa, OK 74107",            lat: 36.0996, lon: -96.0297 },
      { label: "Broken Arrow",        brand: "Cheapest Auto Insurance",  addr: "2214 W Houston St, Broken Arrow, OK 74012",       lat: 36.0468, lon: -95.8166 },
      { label: "OKC – SE 15th",       brand: "Cheapest Auto Insurance",  addr: "5529 SE 15th St Suite E, Midwest City, OK 73110", lat: 35.4503, lon: -97.4242 },
      { label: "OKC – NW Expressway", brand: "Cheapest Auto Insurance",  addr: "6212 Northwest Expy, Oklahoma City, OK 73132",    lat: 35.5560, lon: -97.6247 },
      { label: "OKC – South Walker",  brand: "Cheapest Auto Insurance",  addr: "7410 S Walker Ave, Oklahoma City, OK 73139",      lat: 35.3926, lon: -97.5208 },
      { label: "OKC – S Western",     brand: "Save Money Car Insurance", addr: "9356 S Western Ave Suite 104, Oklahoma City, OK 73139", lat: 35.3548, lon: -97.5153 },
      { label: "Pine St",             brand: "Cheapest Auto Insurance",  addr: "4818 E Pine St, Tulsa, OK 74115",                 lat: 36.177081, lon: -95.922842 },
    ];

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 3958.8;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function estMinutes(miles) { return Math.round(miles / 25 * 60); }

    function mapsUrl(from, to) {
      return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(from)}&destination=${encodeURIComponent(to)}&travelmode=driving`;
    }

    async function geocode(address) {
      const url = `https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(address)}&filter=countrycode:us&limit=1&apiKey=${GEOAPIFY_KEY}`;
      const r = await fetch(url);
      const d = await r.json();
      if (!d.features || !d.features.length) return null;
      const [lon, lat] = d.features[0].geometry.coordinates;
      return { lat, lon };
    }

    async function findNearest() {
      const input = document.getElementById('addr').value.trim();
      const status = document.getElementById('status');
      const results = document.getElementById('results');

      if (!input) { status.textContent = 'Please enter a customer address.'; status.className = 'status err'; return; }

      status.textContent = 'Looking up address…';
      status.className = 'status';
      results.classList.add('hidden');

      const query = /ok(lahoma)?/i.test(input) ? input : input + ', OK';
      const origin = await geocode(query);

      if (!origin) { status.textContent = 'Address not found. Try adding a city or zip code.'; status.className = 'status err'; return; }

      const ranked = OFFICES.map(o => {
        const miles = haversine(origin.lat, origin.lon, o.lat, o.lon);
        return { ...o, miles, mins: estMinutes(miles) };
      }).sort((a, b) => a.miles - b.miles);

      const best = ranked[0];
      const rest = ranked.slice(1, 6);

      status.textContent = "Searched all 14 offices — here's the closest.";
      status.className = 'status';

      results.innerHTML = `
        <div class="result-card">
          <div class="result-top">
            <div class="result-icon"><i class="ti ti-building-store"></i></div>
            <div>
              <div class="result-label-name">${best.label}</div>
              <span class="brand-pill">${best.brand}</span>
              <div class="result-addr">${best.addr}</div>
            </div>
          </div>
          <div class="pills">
            <div class="pill"><i class="ti ti-clock"></i> ~${best.mins} min drive</div>
            <div class="pill"><i class="ti ti-road"></i> ${best.miles.toFixed(1)} miles away</div>
          </div>
          <a class="btn-maps" href="${mapsUrl(input, best.addr)}" target="_blank">
            <i class="ti ti-map-2"></i> Open in Google Maps
          </a>
        </div>
        <div class="others-label">Other nearby offices</div>
        <div class="others-list">
          ${rest.map((o, i) => `
            <div class="other-row">
              <div class="other-rank">#${i+2}</div>
              <div class="other-info">
                <div class="other-name">${o.label}</div>
                <div class="other-addr">${o.addr}</div>
              </div>
              <div class="other-time"><i class="ti ti-clock"></i> ~${o.mins} min</div>
            </div>
          `).join('')}
        </div>
      `;
      results.classList.remove('hidden');
    }

    document.getElementById('addr').addEventListener('keydown', e => {
      if (e.key === 'Enter') findNearest();
    });
  </script>
</body>
</html>
